name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Gerar APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: GTEL-Ensaios-Eletricos-APK
          path: app/build/outputs/apk/debug/*.apk
